name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  homeboy:
    name: Homeboy ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: lint
            label: lint (PHPCS + PHPStan)
          - command: test
            label: tests (PHPUnit + smoke tests)

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - name: Run Homeboy ${{ matrix.command }}
        uses: Extra-Chill/homeboy-action@ecf759622ccf5bfac9612f6039494812a734f532 # v2.7.6
        with:
          commands: ${{ matrix.command }}
          expected-commands: lint,test
          app-token: ${{ steps.app-token.outputs.token || '' }}
          autofix: 'true'
          autofix-commands: 'lint --fix'

      - name: Run PHP smoke tests
        if: matrix.command == 'test'
        run: composer smoke
