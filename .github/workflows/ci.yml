name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: phpstan
            label: PHPStan
          - command: smoke
            label: PHP smoke tests

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run ${{ matrix.label }}
        run: composer ${{ matrix.command }}

  workflow-contracts:
    name: Workflow contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Checkout Docs Agent producer
        uses: actions/checkout@v7.0.0
        with:
          repository: Automattic/docs-agent
          ref: 7b67d341eea16b75b8e055507d36a8d8e69a1fe3
          path: .docs-agent-producer

      - name: Checkout WP Codebox producer schema
        uses: actions/checkout@v7.0.0
        with:
          repository: Automattic/wp-codebox
          ref: a6fe2d208e990a8d04104aa74aacbb8d1539fbc1
          path: .wp-codebox-producer

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Validate native Docs Agent producer contract
        env:
          DOCS_AGENT_DIR: ${{ github.workspace }}/.docs-agent-producer
          WP_CODEBOX_DIR: ${{ github.workspace }}/.wp-codebox-producer
        run: php tests/docs-agent-native-workflow-contract.php

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          # With no paths, actionlint discovers and reads every workflow file.
          args: -no-color

  option-store-concurrency:
    name: Option-store concurrency
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: agents_api_test
          MARIADB_USER: agents_api
          MARIADB_PASSWORD: agents_api
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, pcntl
          coverage: none

      - name: Download WordPress database layer
        run: |
          curl --fail --silent --show-error https://wordpress.org/latest.tar.gz | tar -xz -C /tmp

      - name: Run option-store concurrency tests
        env:
          AGENTS_API_WP_ROOT: /tmp/wordpress
          AGENTS_API_DB_HOST: 127.0.0.1:3306
          AGENTS_API_DB_NAME: agents_api_test
          AGENTS_API_DB_USER: agents_api
          AGENTS_API_DB_PASSWORD: agents_api
        run: php tests/run-control-option-store-integration.php
